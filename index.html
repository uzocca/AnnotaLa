<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8f6f0">
<title>AnnotaLa</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f6f0;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0ddd6;
    --accent: #1a1a1a;
    --hover: #f0ede6;
    --danger: #c0392b;
    --font: 'Georgia', serif;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
  }

  /* AUTH */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 360px;
  }

  .auth-box h1 {
    font-family: var(--font);
    font-size: 1.8rem;
    font-weight: normal;
    margin-bottom: 0.25rem;
    text-align: center;
  }

  .auth-box p.subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }

  .auth-box input {
    width: 100%;
    padding: 0.65rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    background: var(--bg);
    color: var(--text);
    margin-bottom: 0.75rem;
    outline: none;
    font-family: var(--font-ui);
  }

  .auth-box input:focus { border-color: #999; }

  .btn-primary {
    width: 100%;
    padding: 0.65rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: var(--font-ui);
    margin-top: 0.25rem;
  }

  .btn-primary:hover { opacity: 0.85; }

  .auth-toggle {
    text-align: center;
    margin-top: 1.25rem;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .auth-toggle a { color: var(--text); cursor: pointer; text-decoration: underline; }

  .auth-message {
    font-size: 0.82rem;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    margin-bottom: 0.75rem;
    display: none;
  }

  .auth-message.error { background: #fdecea; color: #c0392b; display: block; }
  .auth-message.success { background: #eafaf1; color: #1e8449; display: block; }

  /* APP LAYOUT */
  #app-screen { display: none; height: 100vh; flex-direction: column; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.25rem;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .topbar-left { display: flex; align-items: center; gap: 1rem; }

  .topbar h1 {
    font-family: var(--font);
    font-size: 1.25rem;
    font-weight: normal;
  }

  .btn-new {
    padding: 0.35rem 0.85rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: var(--font-ui);
  }

  .btn-new:hover { opacity: 0.8; }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 0.3rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: var(--font-ui);
  }

  .btn-icon:hover { color: var(--text); background: var(--hover); }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-search {
    padding: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-search input {
    width: 100%;
    padding: 0.45rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.85rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    font-family: var(--font-ui);
  }

  .sidebar-search input:focus { border-color: #999; }

  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem 0;
  }

  .note-item {
    padding: 0.65rem 1rem;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s;
  }

  .note-item:hover { background: var(--hover); }
  .note-item.active { border-left-color: var(--accent); background: var(--hover); }

  .note-item-title {
    font-size: 0.9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.2rem;
  }

  .note-item-preview {
    font-size: 0.78rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .note-item-date {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  .empty-list {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  /* EDITOR */
  .editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .editor-toolbar {
    padding: 0.6rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .editor-status {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.82rem;
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
    font-family: var(--font-ui);
  }

  .btn-delete:hover { color: var(--danger); background: #fdecea; }

  .editor-inner {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }

  #note-title {
    font-family: var(--font);
    font-size: 2rem;
    font-weight: normal;
    border: none;
    background: transparent;
    color: var(--text);
    outline: none;
    width: 100%;
    resize: none;
    line-height: 1.3;
  }

  #note-content {
    font-family: var(--font);
    font-size: 1.05rem;
    line-height: 1.8;
    border: none;
    background: transparent;
    color: var(--text);
    outline: none;
    width: 100%;
    resize: none;
    flex: 1;
    min-height: 400px;
  }

  .empty-editor {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    flex-direction: column;
    gap: 1rem;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .sidebar { width: 100%; position: absolute; z-index: 10; height: 100%; }
    .sidebar.hidden { display: none; }
    .editor-area { width: 100%; }
    .editor-inner { padding: 1.5rem 1.25rem; }
    #note-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>AnnotaLa</h1>
    <p class="subtitle">Le tue note, sempre con te</p>
    <div class="auth-message" id="auth-msg"></div>
    <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
    <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
    <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Accedi</button>
    <div class="auth-toggle">
      <span id="auth-toggle-text">Non hai un account?</span>
      <a onclick="toggleAuthMode()"> <span id="auth-toggle-link">Registrati</span></a>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <h1>AnnotaLa</h1>
      <button class="btn-new" onclick="newNote()">+ Nuova nota</button>
    </div>
    <button class="btn-icon" onclick="signOut()">Esci</button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="Cerca..." oninput="filterNotes(this.value)">
      </div>
      <div class="notes-list" id="notes-list"></div>
    </div>
    <div class="editor-area" id="editor-area">
      <div class="editor-toolbar" id="editor-toolbar" style="display:none">
        <span class="editor-status" id="save-status">Salvato</span>
        <button class="btn-delete" onclick="deleteNote()">Elimina nota</button>
      </div>
      <div class="editor-inner" id="editor-inner">
        <div class="empty-editor" id="empty-editor">
          <span>Seleziona una nota o creane una nuova</span>
          <button class="btn-new" onclick="newNote()">+ Nuova nota</button>
        </div>
        <textarea id="note-title" placeholder="Titolo" oninput="onEditorChange()" style="display:none"></textarea>
        <textarea id="note-content" placeholder="Scrivi qui..." oninput="onEditorChange()" style="display:none"></textarea>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zuvgdhkqgejauzdyuuem.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bik8pdyr88C0WLjHIk67xA_xO0BOS4A';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let notes = [];
let currentNote = null;
let saveTimer = null;
let isRegister = false;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp();
  sb.auth.onAuthStateChange((event, session) => {
    if (session) showApp();
    else showAuth();
  });
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  await loadNotes();
}

function toggleAuthMode() {
  isRegister = !isRegister;
  document.getElementById('auth-btn').textContent = isRegister ? 'Registrati' : 'Accedi';
  document.getElementById('auth-toggle-text').textContent = isRegister ? 'Hai già un account?' : 'Non hai un account?';
  document.getElementById('auth-toggle-link').textContent = isRegister ? 'Accedi' : 'Registrati';
  setAuthMsg('', '');
}

function setAuthMsg(text, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'auth-message' + (type ? ' ' + type : '');
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!email || !password) return setAuthMsg('Inserisci email e password', 'error');
  setAuthMsg('...', '');
  let result;
  if (isRegister) {
    result = await sb.auth.signUp({ email, password });
    if (!result.error) return setAuthMsg('Registrato! Ora accedi.', 'success');
  } else {
    result = await sb.auth.signInWithPassword({ email, password });
  }
  if (result.error) setAuthMsg(result.error.message, 'error');
}

async function signOut() {
  await sb.auth.signOut();
  notes = [];
  currentNote = null;
  renderNotesList();
  clearEditor();
}

async function loadNotes() {
  const { data } = await sb.from('notes').select('*').order('updated_at', { ascending: false });
  notes = data || [];
  renderNotesList();
}

function renderNotesList(filtered) {
  const list = document.getElementById('notes-list');
  const items = filtered !== undefined ? filtered : notes;
  if (!items.length) {
    list.innerHTML = '<div class="empty-list">Nessuna nota ancora</div>';
    return;
  }
  list.innerHTML = items.map(n => `
    <div class="note-item ${currentNote && currentNote.id === n.id ? 'active' : ''}" onclick="openNote('${n.id}')">
      <div class="note-item-title">${escHtml(n.title || 'Senza titolo')}</div>
      <div class="note-item-preview">${escHtml((n.content || '').substring(0, 60))}</div>
      <div class="note-item-date">${formatDate(n.updated_at)}</div>
    </div>
  `).join('');
}

function filterNotes(q) {
  if (!q) return renderNotesList();
  const ql = q.toLowerCase();
  renderNotesList(notes.filter(n =>
    (n.title || '').toLowerCase().includes(ql) ||
    (n.content || '').toLowerCase().includes(ql)
  ));
}

function openNote(id) {
  currentNote = notes.find(n => n.id === id);
  if (!currentNote) return;
  document.getElementById('empty-editor').style.display = 'none';
  document.getElementById('note-title').style.display = 'block';
  document.getElementById('note-content').style.display = 'block';
  document.getElementById('editor-toolbar').style.display = 'flex';
  document.getElementById('note-title').value = currentNote.title || '';
  document.getElementById('note-content').value = currentNote.content || '';
  setSaveStatus('Salvato');
  renderNotesList();
}

function clearEditor() {
  currentNote = null;
  document.getElementById('empty-editor').style.display = 'flex';
  document.getElementById('note-title').style.display = 'none';
  document.getElementById('note-content').style.display = 'none';
  document.getElementById('editor-toolbar').style.display = 'none';
}

async function newNote() {
  const { data: { user } } = await sb.auth.getUser();
  const { data, error } = await sb.from('notes').insert({
    title: '',
    content: '',
    user_id: user.id,
    updated_at: new Date().toISOString()
  }).select().single();
  if (error) return;
  notes.unshift(data);
  openNote(data.id);
}

function onEditorChange() {
  setSaveStatus('Modificato...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNote, 1200);
}

async function saveNote() {
  if (!currentNote) return;
  const title = document.getElementById('note-title').value;
  const content = document.getElementById('note-content').value;
  const updated_at = new Date().toISOString();
  const { error } = await sb.from('notes').update({ title, content, updated_at }).eq('id', currentNote.id);
  if (!error) {
    currentNote.title = title;
    currentNote.content = content;
    currentNote.updated_at = updated_at;
    const idx = notes.findIndex(n => n.id === currentNote.id);
    if (idx > 0) { notes.splice(idx, 1); notes.unshift(currentNote); }
    renderNotesList();
    setSaveStatus('Salvato');
  }
}

async function deleteNote() {
  if (!currentNote) return;
  if (!confirm('Eliminare questa nota?')) return;
  await sb.from('notes').delete().eq('id', currentNote.id);
  notes = notes.filter(n => n.id !== currentNote.id);
  clearEditor();
  renderNotesList();
}

function setSaveStatus(text) {
  document.getElementById('save-status').textContent = text;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
